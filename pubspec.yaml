name: hoxton_task
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16+1
  flutter_bloc: ^9.0.0
  get_it: ^8.0.2
  equatable: ^2.0.5
  go_router: ^14.6.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/png/
    - assets/images/svg/

  fonts:
    - family: Sentient
      fonts:
        - asset: assets/fonts/Sentient-Light.otf
          weight: 300
        - asset: assets/fonts/Sentient-Regular.otf
          weight: 400
        - asset: assets/fonts/Sentient-Medium.otf
          weight: 500
        - asset: assets/fonts/Sentient-Bold.otf
          weight: 700
